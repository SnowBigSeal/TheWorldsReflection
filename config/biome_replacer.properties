# Biome Replacer configuration for The World's Reflection
# Enforces the FracturedWorlds overworld vision: temperate, forested, mountainous.
# No snow, no desert, no jungle, no savanna, no swamp.
#
# Rules: old_biome > new_biome
# https://modrinth.com/mod/biome-replacer

[minecraft:overworld]

# --- Frigid biomes -> custom FracturedWorlds replacements ---
# These mirror the climate zone but without snow
minecraft:jagged_peaks > fracturedworlds:rocky_peaks
minecraft:frozen_peaks > fracturedworlds:bare_peaks
minecraft:snowy_slopes > fracturedworlds:alpine_slopes
minecraft:grove > fracturedworlds:alpine_grove
minecraft:snowy_plains > fracturedworlds:cold_clearing
minecraft:ice_spikes > fracturedworlds:cold_clearing
minecraft:snowy_taiga > fracturedworlds:cold_forest

# --- Remaining frigid -> nearest allowed vanilla biome ---
minecraft:snowy_beach > minecraft:beach
minecraft:frozen_ocean > minecraft:cold_ocean
minecraft:deep_frozen_ocean > minecraft:deep_cold_ocean
minecraft:frozen_river > minecraft:river

# --- Desert/Arid -> temperate equivalents ---
minecraft:desert > minecraft:plains
minecraft:badlands > minecraft:stony_peaks
minecraft:eroded_badlands > minecraft:stony_peaks
minecraft:wooded_badlands > minecraft:windswept_forest

# --- Jungle -> forest equivalents ---
minecraft:jungle > minecraft:dark_forest
minecraft:bamboo_jungle > minecraft:dark_forest
minecraft:sparse_jungle > minecraft:forest

# --- Savanna -> open temperate equivalents ---
minecraft:savanna > minecraft:plains
minecraft:savanna_plateau > minecraft:meadow
minecraft:windswept_savanna > minecraft:windswept_hills

# --- Swamp/Mushroom -> forest equivalents ---
minecraft:swamp > minecraft:dark_forest
minecraft:mangrove_swamp > minecraft:forest
minecraft:mushroom_fields > minecraft:meadow
