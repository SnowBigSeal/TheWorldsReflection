terralith:alpha_islands_winter > terralith:alpha_islands
terralith:ice_marsh > terralith:shield_clearing
terralith:snowy_badlands > terralith:valley_clearing
terralith:snowy_cherry_grove > minecraft:cherry_grove
terralith:snowy_maple_forest > terralith:yellowstone
terralith:snowy_shield > terralith:shield
terralith:skylands_winter > terralith:skylands_autumn
terralith:wintry_forest > terralith:birch_taiga
terralith:wintry_lowlands > terralith:valley_clearing
terralith:siberian_grove > terralith:alpine_grove
terralith:siberian_taiga > terralith:shield
